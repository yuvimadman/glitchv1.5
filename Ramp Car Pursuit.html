<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Unity WebGL Player</title>
    <style>
        *, html, body { padding:0; margin:0; box-sizing:border-box; }
        html, body { overflow: hidden; height: 100%; background: #000; -webkit-user-select: none; user-select: none; }
        canvas:focus { outline: none; }
        #unity-container { width:100%; height:100%; }
        #unity-canvas   { width:100%; height:100%; display:block; }
        #loading-cover { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a2e; z-index: 100; }
        #loading-cover.hidden { display: none; }
        #load-label { color: #ccc; font-family: sans-serif; font-size: 14px; margin-bottom: 16px; }
        #bar-wrap { width: 260px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        #bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#4e9af1,#a78bfa); border-radius: 4px; transition: width .25s ease; }
    </style>
</head>
<body>

<div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
</div>

<div id="loading-cover">
    <div id="load-label">Connecting to server...</div>
    <div id="bar-wrap"><div id="bar-fill"></div></div>
</div>

<script>
var ysdk = {
    environment: {
        i18n: { lang: "en", tld: "com" },
        app: { id: "489585" },
        deviceInfo: { type: "desktop" }
    },
    features: {
        LoadingAPI: {
            ready: function() { console.log("Game Ready"); }
        }
    },
    getEnvironment: function() { return this.environment; },
    adv: {
        showFullscreenAdv: function(c) { if(c && c.callbacks && c.callbacks.onClose) c.callbacks.onClose(true); },
        showRewardedVideo: function(c) { if(c && c.callbacks && c.callbacks.onClose) c.callbacks.onClose(true); }
    },
    getPlayer: function() {
        return Promise.resolve({
            getName: function() { return "Guest"; },
            getPhoto: function() { return ""; },
            getUniqueID: function() { return "0"; }
        });
    }
};

var NO_DATA = "no data";
var playerData = NO_DATA;
var paymentsData = NO_DATA;
var cloudSaves = NO_DATA;
var initGame = true;
var player = null;
var ygGameInstance = null;
var initYSDK = true;

function LogStyledMessage(msg, style) { console.log(msg); }
function YG2Instance(method, arg) {
    if (!ygGameInstance) return;
    try {
        if (arg !== undefined) ygGameInstance.SendMessage("YG2Instance", method, arg);
        else ygGameInstance.SendMessage("YG2Instance", method);
    } catch(e) {}
}

function SaveCloud()        {}
function LoadCloud()        { YG2Instance("SetLoadSaves", NO_DATA); return Promise.resolve(NO_DATA); }
function StickyAdActivity() {}
function RewardedAdvShow(id){ YG2Instance("OpenRewardedAdv"); YG2Instance("RewardAdv", id); YG2Instance("CloseRewardedAdv"); }
function InterAdvShow()     { YG2Instance("OpenInterAdv"); YG2Instance("CloseInterAdv","true"); }
function InitPayments()     { YG2Instance("PaymentsEntries", NO_DATA); return Promise.resolve(NO_DATA); }
function InitPlayer()       {
    const j = JSON.stringify({ playerAuth:"rejected", playerName:"Guest", playerId:"0", playerPhoto:"no data", payingStatus:"unknown" });
    YG2Instance("SetAuth", j);
    return Promise.resolve(j);
}
function InitGame() { initGame = true; }

const label   = document.getElementById("load-label");
const barFill = document.getElementById("bar-fill");
const cover   = document.getElementById("loading-cover");

const BUILD_URL  = "https://cdn.jsdelivr.net/gh/UGBONTOP/ugs-crunch-files@main/car-vs-ramp-police/Build";
const DATA_PARTS = 6;
const WASM_PARTS = 5;

function setProgress(pct, text) {
    barFill.style.width = pct + "%";
    label.textContent   = text;
}

async function fetchParts(baseName, count, startPct, endPct) {
    const chunks = [];
    const step   = (endPct - startPct) / count;
    for (let i = 0; i < count; i++) {
        const url  = `${BUILD_URL}/${baseName}.part${i}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`Fetch failed: ${url}`);
        const buf  = await resp.arrayBuffer();
        chunks.push(new Uint8Array(buf));
        setProgress(Math.round(startPct + step * (i + 1)), `Fetching... ${i+1}/${count}`);
    }
    const total  = chunks.reduce((s, c) => s + c.length, 0);
    const merged = new Uint8Array(total);
    let offset = 0;
    for (const c of chunks) { merged.set(c, offset); offset += c.length; }
    return URL.createObjectURL(new Blob([merged]));
}

(async () => {
    try {
        const [dataUrl, wasmUrl] = await Promise.all([
            fetchParts("Build.data.br",  DATA_PARTS, 5,  50),
            fetchParts("Build.wasm.br",  WASM_PARTS, 50, 90),
        ]);
        const frameworkUrl = `${BUILD_URL}/Build.framework.js`;
        const loaderScript = document.createElement("script");
        loaderScript.src = `${BUILD_URL}/Build.loader.js`;
        loaderScript.onload = () => {
            const canvas = document.getElementById("unity-canvas");
            const config = {
                dataUrl: dataUrl,
                frameworkUrl: frameworkUrl,
                codeUrl: wasmUrl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "DefaultCompany",
                productName: "Rampa VS Police",
                productVersion: "0.1",
            };
            createUnityInstance(canvas, config, p => {
                setProgress(Math.round(90 + p * 10), "Launching...");
            }).then(inst => {
                ygGameInstance = inst;
                cover.classList.add("hidden");
                setTimeout(() => {
                    InitGame();
                    YG2Instance("InitSDKComplete");
                    YG2Instance("SetAuth", JSON.stringify({ playerAuth:"rejected", playerName:"Guest", playerId:"0" }));
                }, 500);
                canvas.focus();
            }).catch(e => { label.textContent = "Error: " + e; });
        };
        document.body.appendChild(loaderScript);
    } catch (err) { label.textContent = "Error: " + err.message; }
})();

document.addEventListener("contextmenu", e => e.preventDefault());
const oPRL = Element.prototype.requestPointerLock;
Element.prototype.requestPointerLock = async function(...args) {
    try { (args[0] ||= {}).unadjustedMovement = true; await oPRL.apply(this, args); } catch(e) {}
};
</script>
</body>
</html>
